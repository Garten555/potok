<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>POTOK — подтверждение</title>
</head>
<body style="margin:0;padding:0;background:#0b1020;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0b1020;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:480px;background:#111a2c;border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:28px 24px 8px 24px;">
              <p style="margin:0;font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#67e8f9;">POTOK</p>
              <h1 style="margin:12px 0 0 0;font-size:22px;line-height:1.25;color:#f1f5f9;">Подтвердите регистрацию</h1>
              <p style="margin:12px 0 0 0;font-size:15px;line-height:1.5;color:#94a3b8;">Введите код ниже на странице входа POTOK. Ссылку нажимать не нужно.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 24px 24px 24px;">
              <div style="border-radius:12px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.25);padding:20px;text-align:center;">
                <p style="margin:0 0 8px 0;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#94a3b8;">Код подтверждения</p>
                <p style="margin:0;font-size:32px;font-weight:700;letter-spacing:0.35em;color:#e0f2fe;font-family:ui-monospace,Menlo,Consolas,monospace;">{{ .Token }}</p>
              </div>
              <p style="margin:16px 0 0 0;font-size:13px;color:#64748b;">Если вы не регистрировались в POTOK, просто проигнорируйте это письмо.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px 24px 24px;border-top:1px solid rgba(255,255,255,0.06);">
              <p style="margin:16px 0 0 0;font-size:12px;color:#64748b;">Адрес: {{ .Email }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
